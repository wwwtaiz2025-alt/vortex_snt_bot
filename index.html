<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex — التعدين والشراء المسبق</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b141c;
            color: #dae3ee;
            font-family: 'Plus Jakarta Sans', 'IBM Plex Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(24, 32, 40, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(238, 193, 60, 0.15);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(238, 193, 60, 0.35);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .tab-btn {
            padding: 0.6rem 1rem;
            border-radius: 3rem;
            border: none;
            background: transparent;
            color: #8a7e6b;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: rgba(238, 193, 60, 0.15);
            color: #f5c842;
            box-shadow: 0 0 20px rgba(245, 200, 66, 0.08);
        }
        .tab-btn:hover { color: #f5e6c8; }
        .tab-panel {
            display: none;
            animation: fadeSlide 0.35s ease;
        }
        .tab-panel.active { display: block; }
        @keyframes fadeSlide {
            0% { opacity: 0.3; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .btn-primary {
            background: linear-gradient(135deg, #f5c842, #d4af37);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            font-weight: 700;
            color: #0b141c;
            cursor: pointer;
            transition: 0.25s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245, 200, 66, 0.3); }
        .btn-secondary {
            background: rgba(245, 200, 66, 0.08);
            border: 1px solid rgba(245, 200, 66, 0.2);
            padding: 0.7rem 1.2rem;
            border-radius: 3rem;
            font-weight: 600;
            color: #f5c842;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary:hover { background: rgba(245, 200, 66, 0.15); }
        .status-msg { font-size: 0.85rem; min-height: 1.5rem; color: #b0a48a; margin-top: 0.3rem; }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 1.5rem;
        }
        .overlay.hidden { display: none; }
        .overlay .card {
            background: rgba(10,8,8,0.9);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            max-width: 440px;
            width: 100%;
        }
        .overlay .brand { text-align: center; margin-bottom: 2rem; }
        .overlay .brand h1 { font-size: 2.2rem; font-weight: 300; color: #f5e6c8; }
        .overlay .brand h1 span { color: #d4af37; font-weight: 700; }
        .overlay .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.8rem; }
        .overlay .tabs label {
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            border-radius: 3rem;
            background: rgba(255,255,255,0.03);
            color: #8a7e6b;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        #tabLogin:checked ~ .tabs label[for="tabLogin"],
        #tabSignup:checked ~ .tabs label[for="tabSignup"] {
            background: rgba(212,175,55,0.12);
            border-color: #d4af37;
            color: #f5e6c8;
        }
        .overlay .forms .form-box { display: none; flex-direction: column; gap: 1.2rem; }
        #tabLogin:checked ~ .forms #loginForm { display: flex; }
        #tabSignup:checked ~ .forms #signupForm { display: flex; }
        .overlay input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 2.2rem;
            padding: 0.7rem 1.2rem;
            color: #f0e6d5;
            width: 100%;
            outline: none;
        }
        .overlay input:focus { border-color: #d4af37; }
        .overlay .error-msg { color: #e74c3c; font-size: 0.85rem; text-align: center; min-height: 1.4rem; }
        .counter-number { font-size: 3rem; font-weight: 800; color: #f5c842; }
        .progress-bar-bg { background: #1a2340; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, #f5c842, #f5a623); height: 100%; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @media (max-width: 768px) {
            .glass-card { padding: 1rem; }
            .tab-btn { font-size: 0.8rem; padding: 0.4rem 0.7rem; }
        }
    </style>
</head>
<body>

<!-- ===== OVERLAY ===== -->
<div class="overlay" id="loginOverlay">
    <div class="card">
        <div class="brand">
            <h1>Vortex <span>✦</span></h1>
            <p style="color:#7a6e5b;">سجل دخولك أو أنشئ حساباً</p>
        </div>
        <input type="radio" name="tab" id="tabLogin" checked>
        <input type="radio" name="tab" id="tabSignup">
        <div class="tabs">
            <label for="tabLogin">تسجيل الدخول</label>
            <label for="tabSignup">إنشاء حساب</label>
        </div>
        <div class="forms">
            <form class="form-box" id="loginForm">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
                <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
                <div class="error-msg" id="loginError"></div>
                <button class="btn-primary" type="submit" style="width:100%;">دخول</button>
            </form>
            <form class="form-box" id="signupForm">
                <input type="text" id="signupName" placeholder="الاسم الكامل" required>
                <input type="tel" id="signupPhone" placeholder="رقم الجوال" required>
                <input type="email" id="signupEmail" placeholder="البريد الإلكتروني" required>
                <input type="password" id="signupPassword" placeholder="كلمة المرور" required>
                <div class="error-msg" id="signupError"></div>
                <button class="btn-primary" type="submit" style="width:100%;">إنشاء الحساب</button>
            </form>
        </div>
    </div>
</div>

<!-- ===== MAIN APP ===== -->
<div class="app-container" style="display:flex; flex-direction:column; min-height:100vh;">

    <header style="display:flex; justify-content:space-between; align-items:center; padding:1rem 1.5rem; background:rgba(11,20,28,0.85); backdrop-filter:blur(12px); border-bottom:1px solid rgba(212,175,55,0.15);">
        <div style="display:flex; align-items:center; gap:0.8rem;">
            <span style="font-size:1.8rem; font-weight:700; color:#f5c842;">VORTEX</span>
        </div>
        <div style="display:flex; align-items:center; gap:0.8rem;">
            <span style="background:rgba(245,200,66,0.1); padding:0.3rem 1rem; border-radius:3rem; border:1px solid rgba(245,200,66,0.2); font-size:0.9rem; color:#f5c842;">
                <span id="headerVtxBalance">{{POINTS}}</span> VTX
            </span>
            <span style="color:#8a7e6b; font-size:0.85rem;" id="headerUsername">@{{USERNAME}}</span>
        </div>
    </header>

    <main style="flex:1; padding:1.2rem 1.5rem; max-width:1280px; margin:0 auto; width:100%;">

        <div style="display:flex; gap:0.4rem; background:rgba(0,0,0,0.25); border-radius:3rem; padding:0.4rem; margin-bottom:1.5rem; flex-wrap:wrap; border:1px solid rgba(212,175,55,0.08);">
            <button class="tab-btn active" data-tab="mining">⛏️ التعدين</button>
            <button class="tab-btn" data-tab="presale">💎 الشراء المسبق</button>
            <button class="tab-btn" data-tab="wallet">💰 المحفظة</button>
            <button class="tab-btn" data-tab="referrals">👥 الإحالات</button>
            <button class="tab-btn" data-tab="admin" id="adminTabBtn" style="display:none;">⚙️ الإدارة</button>
        </div>

        <!-- ===== تبويب التعدين ===== -->
        <div class="tab-panel active" id="tab-mining">
            <div class="glass-card" style="max-width:600px; margin:0 auto; text-align:center;">
                <h3 style="color:#f5c842; font-weight:300; font-size:1.4rem; margin-bottom:0.5rem;">⛏️ التعدين الآلي</h3>
                <p style="color:#8a7e6b; font-size:0.85rem; margin-bottom:1.5rem;">اضغط لزيادة أرباحك اليومية</p>

                <div style="margin-bottom:1.5rem;">
                    <div style="color:#8a7e6b; font-size:0.8rem;">👥 عدد المستخدمين المسجلين</div>
                    <div class="counter-number" id="totalUsersDisplay">{{TOTAL_USERS}}</div>
                    <div style="font-size:0.8rem; color:#6a5f4e;">الهدف: 20,000 مستخدم</div>
                    <div class="progress-bar-bg" style="margin-top:0.5rem;">
                        <div class="progress-bar-fill" id="targetProgress" style="width:{{PROGRESS}}%;"></div>
                    </div>
                </div>

                <div id="miningStatus" style="margin-bottom:1rem; font-weight:bold; color:#f39c12;">
                    ⏳ جاري تحميل حالة التعدين...
                </div>

                <button class="btn-primary" id="mineBtn" style="width:100%; padding:0.8rem; font-size:1.1rem; margin-bottom:0.8rem;">
                    ⛏️ تعدين (يدوي)
                </button>
                <div class="status-msg" id="miningMessage"></div>

                <div style="margin-top:1.5rem; background:rgba(0,0
